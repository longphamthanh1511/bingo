
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #app {
    background: linear-gradient(160deg, #1a0533 0%, #2d0a5c 50%, #1a0533 100%);
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    border-radius: var(--border-radius-lg);
    padding: 2vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5vh;
  }
  h2.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  .title-text {
    font-size: 3vw;
    font-weight: 500;
    color: #f9d74c;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 20px #f9d74c88;
    margin-bottom: 5vh;
    margin-bottom: 5vh;
    gap: 0.5vw;
  }
  .stage {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0vw;
    width: 100%;
    max-width: 30vw;
  }
  .character { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  /* HOST character */
.host-body { 
  position: relative;
  width: 12vw;        
  height: auto;      
  overflow: visible;
}

  .host-head {
    position: absolute;
    width: 4vw;
    height: 4vw;
    border-radius: 100%;

    border-radius: 50%;
    overflow: hidden;

    top: -10%;    
    left: 33%;    
    transform: translateX(-50%);
  }

  .host-head img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* SPINNER GIRL character */
  .girl-body { 
    position: relative;
    width: 10vw;        
    height: auto;      
    overflow: visible;
  }
  .girl-head {
    position: absolute;
    width: 4vw;
    height: 4vw;
    border-radius: 100%;

    border-radius: 50%;
    overflow: hidden;

    top: -10%;
    left: 70%;
    transform: translateX(-50%);
  }
  .girl-head img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /*image*/

.character-img {
  width: 100%;
  height: 100%;
  object-fit: contain;   /* keeps full body visible */
  display: block;
}

  @keyframes sway {
    0%,100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }
  @keyframes spin-girl {
    0% { transform: rotate(-15deg); }
    25% { transform: rotate(15deg); }
    50% { transform: rotate(-10deg); }
    75% { transform: rotate(10deg); }
    100% { transform: rotate(-15deg); }
  }
  @keyframes host-bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .girl-body.spinning { animation: spin-girl 2s ease-in-out infinite; transform-origin: bottom center; }
  .host-body.excited { animation: host-bounce 0.5s ease-in-out infinite; }

  /* Drum machine */
  .drum {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .drum-cage {
    width: 18vw; height: 18vw; border-radius: 50%;
    border: 3px solid #f9d74c;
    background: rgba(249,215,76,0.08);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: visible;
  }
  .drum-inner {
    width: 14vw; height: 14vw; border-radius: 50%;
    border: 2px dashed rgba(249,215,76,0.4);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .drum-number {
    position: absolute;
    font-size: 1vw;
    font-weight: 600;
    color: #fff;
    width: 2.2vw;
    height: 2.2vw;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3),
              inset 2px 2px 4px rgba(255,255,255,0.4);
  }

  /* 12 positions around circle */
  .drum-number:nth-child(1)  { transform: rotate(0deg)   translate(6vw) rotate(0deg); }
  .drum-number:nth-child(2)  { transform: rotate(30deg)  translate(6vw) rotate(-30deg); }
  .drum-number:nth-child(3)  { transform: rotate(60deg)  translate(6vw) rotate(-60deg); }
  .drum-number:nth-child(4)  { transform: rotate(90deg)  translate(6vw) rotate(-90deg); }
  .drum-number:nth-child(5)  { transform: rotate(120deg) translate(6vw) rotate(-120deg); }
  .drum-number:nth-child(6)  { transform: rotate(150deg) translate(6vw) rotate(-150deg); }
  .drum-number:nth-child(7)  { transform: rotate(180deg) translate(6vw) rotate(-180deg); }
  .drum-number:nth-child(8)  { transform: rotate(210deg) translate(6vw) rotate(-210deg); }
  .drum-number:nth-child(9)  { transform: rotate(240deg) translate(6vw) rotate(-240deg); }
  .drum-number:nth-child(10) { transform: rotate(270deg) translate(6vw) rotate(-270deg); }
  .drum-number:nth-child(11) { transform: rotate(300deg) translate(6vw) rotate(-300deg); }
  .drum-number:nth-child(12) { transform: rotate(330deg) translate(6vw) rotate(-330deg); }

  /* Different colors */
  .drum-number:nth-child(1)  { background: #ff4d4d; }
  .drum-number:nth-child(2)  { background: #ff944d; }
  .drum-number:nth-child(3)  { background: #ffd24d; }
  .drum-number:nth-child(4)  { background: #a3ff4d; }
  .drum-number:nth-child(5)  { background: #4dff88; }
  .drum-number:nth-child(6)  { background: #4dfff3; }
  .drum-number:nth-child(7)  { background: #4da6ff; }
  .drum-number:nth-child(8)  { background: #7a4dff; }
  .drum-number:nth-child(9)  { background: #d24dff; }
  .drum-number:nth-child(10) { background: #ff4da6; }
  .drum-number:nth-child(11) { background: #ff6f91; }
  .drum-number:nth-child(12) { background: #ffb347; }
  @keyframes rotate-drum {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .drum-cage.spinning { animation: rotate-drum 0.6s linear infinite; }
  .big-number {
    font-size: 5vw; font-weight: 500;
    color: #fff;
    position: relative; z-index: 2;
    min-width: 10vw; text-align: center;
    transition: transform 0.2s;
  }
  @keyframes pop-number {
    0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .big-number.pop { animation: pop-number 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  .spin-btn {
    background: #f9d74c; color: #1a0533;
    border: none; border-radius: 30px;
    padding: 1.5vh 4.5vw; font-size: 2vw; font-weight: 500;
    cursor: pointer; transition: transform 0.1s, background 0.1s;
    letter-spacing: 1px;
  }
  .spin-btn:hover { background: #ffe566; transform: scale(1.04); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { background: #888; color: #ccc; cursor: not-allowed; }

  .called-section {
    width: 100%; max-width: 80vw;
    background: rgba(255,255,255,0.06);
    border-radius: var(--border-radius-md);
    padding: 1.5vh 2vw;
  }
  .called-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1vh;
  }
  .called-title { font-size: 1.5vw; color: #c9a8f0; }
  .clear-btn {
    font-size: 1.3vw; color: #f08080; background: none;
    border: 1px solid #f0808060; border-radius: 10px;
    padding: 0.3vh 1.3vw; cursor: pointer;
  }
  .called-grid {
    display: flex; flex-wrap: wrap; gap: 0.6vw;
  }
  .called-chip {
    padding: 0.4vh 1vw; border-radius: 12px;
    font-size: 1.3vw; font-weight: 500;
    color: #fff; background: #666;
  }
  .counter { font-size: 1.4vw; color: #c9a8f0; text-align: center; }
  .speech-bubble {
    background: rgba(255,255,255,0.12);
    border-radius: 12px 12px 12px 0;
    padding: 0.9vh 1.5vw;
    font-size: 1.4vw; color: #fff;
    min-width: 9vw; text-align: center;
    min-height: 4vh;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.2vh;
    position: relative;
    top: -5vh;
  }
  .all-called {
    text-align: center; font-size: 1.6vw; color: #f9d74c;
    padding: 1.2vh;
  }

  #app-description {
    position: absolute;
    top: 20px;
    left: 20px;
    width: auto;
    height: auto;
    background: rgba(255,255,255,0.1);
    color: orange;
    padding: 5px;
    font-size: 18px;
    font-family: inherit;
    resize: none;
  }
</style>

<div id="app">
  <div id="app-description">PM: Pham Thanh Long<br>Designer: ファムタンロン<br>Dev: ハム太郎<br>Tester: ファンタム</div>

  <h2 class="sr-only">Bingo number spinner with animated host and spinning girl characters</h2>
  <div class="title-text">✦ Trang Long Weđing Bingo ✦</div>

  <div class="stage">
  <!-- Host (LEFT) -->
  <div class="character">
    <div class="speech-bubble" id="host-bubble">Let's play!</div>
    <div class="host-body" id="host-body">
      <img src="media/host_body.png" class="character-img">
      <div class="host-head">
        <img src="media/host_face.png" alt="Host face">
      </div>
    </div>
  </div>

  <!-- Drum (CENTER) -->
  <script src="confetti.js"></script>
  <div class="drum">
    <div class="drum-cage">
      <div class="drum-inner">

        <div class="drum-number">1</div>
        <div class="drum-number">8</div>
        <div class="drum-number">16</div>
        <div class="drum-number">23</div>
        <div class="drum-number">31</div>
        <div class="drum-number">38</div>
        <div class="drum-number">46</div>
        <div class="drum-number">53</div>
        <div class="drum-number">61</div>
        <div class="drum-number">68</div>
        <div class="drum-number">72</div>
        <div class="drum-number">75</div>

        <div class="big-number" id="big-number">?</div>

      </div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spinNumber()">SPIN!</button>
  </div>

  <!-- Girl (RIGHT) -->
  <div class="character girl-character">
    <div class="speech-bubble" id="girl-bubble">Ready!</div>
    <div class="girl-body" id="girl-body">
      <img src="media/girl_body.png" class="character-img">
      <div class="girl-head">
        <img src="media/girl_face.png" alt="Girl face">
      </div>
    </div>
  </div>
</div>

  <div class="called-section">
    <div class="called-header">
      <span class="called-title" id="counter-text">0 of 75 called</span>
      <button class="clear-btn" onclick="clearAll()">Reset game</button>
    </div>
    <div class="called-grid" id="called-grid">
      <span style="font-size:12px;color:#888;">No numbers called yet</span>
    </div>
  </div>
</div>
<audio id="spin-sound" src="media/spin.mp3" preload="auto"></audio>
<audio id="end-sound" src="media/end.mp3" preload="auto"></audio>
<script>
  const HOST_SAYS = ["Good luck everyone!","Con số gì đây, con số gì đây","次の番号、いきます！","Tích cực quay ..., vận may sẽ đến","さあ運命の番号は…？","ケイタ雑魚っ","Còn thở là còn gỡ!","俺一番優秀","Đánh con 83 mà nó lại ra con 38","Chắc chắn mai trả"];
  const GIRL_SAYS = ["Spin spin spin!","Gà quay","回ります、回ります〜！","Here it comes!","Chóng hết cả mặt","いい番号出るかな〜？", "I'm so dizzy", "Chóng hết cả mặt", "頭痛い～"];
    // Face image options (add more image filenames as needed)
  const HOST_FACES = ["media/host_face.png", "media/host_face2.png", "media/host_face3.png"];
  const GIRL_FACES = ["media/girl_face.png", "media/girl_face2.png", "media/girl_face3.png"];
    let available = [];
  let called = [];

  function buildAvailable() {
    available = [];
    for (let n = 1; n <= 75; n++) available.push(n);
  }
  buildAvailable();

  let spinInterval = null;
  let spinTimeout = null;

  function spinNumber() {
    
    if (available.length === 0) return;
    const btn = document.getElementById('spin-btn');
    btn.disabled = true;
    const spinSound = document.getElementById('spin-sound');
    spinSound.currentTime = 0;
    spinSound.loop = true;
    spinSound.play();

    const drumCage = document.querySelector('.drum-cage');
    const girlBody = document.getElementById('girl-body');
    const hostBody = document.getElementById('host-body');
    const numEl = document.getElementById('big-number');
    const hostBubble = document.getElementById('host-bubble');
    const girlBubble = document.getElementById('girl-bubble');
    
    drumCage.classList.add('spinning');
    girlBody.classList.add('spinning');
    hostBody.classList.add('excited');
    hostBubble.textContent = HOST_SAYS[Math.floor(Math.random()*HOST_SAYS.length)];
    girlBubble.textContent = GIRL_SAYS[Math.floor(Math.random()*GIRL_SAYS.length)];
    numEl.textContent = '?';
    numEl.classList.remove('pop');

    let flashCount = 0;
    spinInterval = setInterval(() => {
      const r = available[Math.floor(Math.random() * available.length)];
      numEl.textContent = r;
      flashCount++;
      
      // Randomly change face images during spin
      if (flashCount % 5 === 0) {
        const hostFaceImg = document.querySelector('.host-head img');
        hostFaceImg.src = HOST_FACES[Math.floor(Math.random() * HOST_FACES.length)];
        
        const girlFaceImg = document.querySelector('.girl-head img');
        girlFaceImg.src = GIRL_FACES[Math.floor(Math.random() * GIRL_FACES.length)];
      }
    }, 80);

    spinTimeout = setTimeout(() => {
      clearInterval(spinInterval);
      drumCage.classList.remove('spinning');
      girlBody.classList.remove('spinning');
      hostBody.classList.remove('excited');
      spinSound.pause();
      spinSound.currentTime = 0;
      
      // Play ending sound for 1 second
      const endSound = document.getElementById('end-sound');
      endSound.currentTime = 0;
      endSound.play();
      setTimeout(() => {
        endSound.pause();
        endSound.currentTime = 0;
      }, 2000);
      
      // Reset faces back to default
      document.querySelector('.host-head img').src = HOST_FACES[0];
      document.querySelector('.girl-head img').src = GIRL_FACES[0];

      const idx = Math.floor(Math.random() * available.length);
      const pick = available.splice(idx, 1)[0];
      called.push(pick);

      numEl.textContent = pick;
      numEl.classList.add('pop');

      fireConfetti();

      hostBubble.textContent = pick + '!';
      girlBubble.textContent = pick + '!';

      updateCalledGrid();
      btn.disabled = available.length === 0;
      if (available.length === 0) {
        document.querySelector('.all-called') || document.getElementById('app').insertAdjacentHTML('beforeend','<div class="all-called">🎉 All 75 numbers called! Game over!</div>');
      }
    }, 3500);
  }

  function updateCalledGrid() {
    const grid = document.getElementById('called-grid');
    const counter = document.getElementById('counter-text');
    counter.textContent = called.length + ' of 75 called';
    if (called.length === 0) {
      grid.innerHTML = '<span style="font-size:12px;color:#888;">No numbers called yet</span>';
      return;
    }
    grid.innerHTML = called.map(c =>
      `<span class="called-chip">${c}</span>`
    ).join('');
  }

  function clearAll() {
    clearInterval(spinInterval);
    clearTimeout(spinTimeout);
    called = [];
    buildAvailable();
    document.getElementById('big-number').textContent = '?';
    document.getElementById('big-number').classList.remove('pop');
    document.getElementById('spin-btn').disabled = false;
    document.getElementById('host-bubble').textContent = "Let's play!";
    document.getElementById('girl-bubble').textContent = "Ready!";
    const ae = document.querySelector('.all-called');
    if (ae) ae.remove();
    updateCalledGrid();
  }

  function fireConfetti() {
    const duration = 1500;
    const end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 5,
        angle: 60,
        spread: 55,
        origin: { x: 0 }
      });
      confetti({
        particleCount: 5,
        angle: 120,
        spread: 55,
        origin: { x: 1 }
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    })();
  }
</script>
